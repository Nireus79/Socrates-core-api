version: '3.8'

services:
  api:
    build: .
    container_name: socrates-api
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=INFO
      - API_RELOAD=false
    volumes:
      - ./src:/app/src
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Optional: Add PostgreSQL for database
  # postgres:
  #   image: postgres:15-alpine
  #   container_name: socrates-db
  #   environment:
  #     POSTGRES_DB: socrates
  #     POSTGRES_USER: socrates
  #     POSTGRES_PASSWORD: changeme
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
